<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SignalTV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#111118;--surface2:#1a1a25;--surface3:#22222f;
  --border:#ffffff12;--border2:#ffffff22;--border3:#ffffff33;
  --accent:#e8302a;--text:#f0f0f0;--muted:#888;--muted2:#555;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

.header{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;cursor:default;user-select:none}
.logo span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:12px}
.live-badge{display:flex;align-items:center;gap:6px;background:#e8302a18;border:1px solid #e8302a55;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;letter-spacing:1px;color:var(--accent);text-transform:uppercase}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--muted2);transition:background .4s;flex-shrink:0}
.conn-dot.online{background:#22c55e}
.conn-dot.offline{background:#ef4444}

.tabs{display:flex;gap:4px;padding:20px 28px 12px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{white-space:nowrap;padding:7px 18px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.tab:hover{border-color:var(--border3);color:var(--text)}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}

.search-wrap{padding:0 28px;margin-bottom:4px}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:10px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted2)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;padding:12px 28px 28px}

.canal-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .25s;position:relative}
.canal-card:hover{border-color:var(--border3);transform:translateY(-3px);background:var(--surface2)}
.canal-card.playing{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.card-thumb{height:88px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.card-thumb::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--surface2) 0%,#0a0a1a 100%)}
.canal-icon{position:relative;z-index:1;width:54px;height:54px;border-radius:10px;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.15;overflow:hidden;flex-direction:column}
.canal-icon img{width:100%;height:100%;object-fit:contain;border-radius:8px}
.canal-icon-text{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:.8px;white-space:pre}
.playing-indicator{position:absolute;top:8px;right:8px;z-index:2;background:var(--accent);border-radius:4px;padding:2px 7px;font-size:9px;font-weight:600;letter-spacing:.8px;color:#fff;text-transform:uppercase;display:none}
.canal-card.playing .playing-indicator{display:block}
.card-info{padding:10px 12px 12px}
.canal-nombre{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;line-height:1.2}
.canal-cat{font-size:11px;text-transform:uppercase;letter-spacing:.5px}

.card-edit-btn{position:absolute;top:8px;left:8px;z-index:3;background:#000000bb;border:1px solid var(--border2);border-radius:6px;width:26px;height:26px;display:none;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--muted);transition:all .2s}
.card-edit-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.admin-mode .card-edit-btn{display:flex}
.admin-mode .canal-card{cursor:default}

.player-overlay{position:fixed;inset:0;z-index:200;background:#000000ee;display:none;align-items:center;justify-content:center;padding:20px}
.player-overlay.open{display:flex}
.player-box{width:100%;max-width:920px;background:var(--surface);border-radius:16px;border:1px solid var(--border2);overflow:hidden;position:relative}
.player-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface)}
.player-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}
.player-cat-badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;margin-left:10px}
.close-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:18px;transition:all .2s;flex-shrink:0}
.close-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.player-frame{width:100%;aspect-ratio:16/9;background:#000;border:none}
.player-footer{padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);flex-wrap:wrap;gap:10px;background:var(--surface)}
.player-hint{font-size:12px;color:var(--muted)}

/* ESTILOS DE BOTONES DE SERVIDORES */
.server-buttons{display:flex;gap:8px;flex-wrap:wrap}
.server-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;transition:all .2s;color:var(--muted);font-weight:500;font-family:'DM Sans',sans-serif}
.server-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);background:var(--surface3);transform:translateY(-1px)}
.server-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(232,48,42,0.3)}
.server-btn.disabled,.server-btn:disabled{opacity:0.4;cursor:not-allowed;filter:grayscale(0.2)}

/* BOTÓN FLOTANTE DE PANTALLA COMPLETA */
.fullscreen-btn{
  position:absolute;
  bottom:70px;
  right:20px;
  width:45px;
  height:45px;
  border-radius:50%;
  background:var(--accent);
  border:none;
  color:white;
  font-size:22px;
  cursor:pointer;
  z-index:250;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .3s ease;
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
  opacity:1;
  visibility:visible;
}
.fullscreen-btn:hover{
  transform:scale(1.1);
  background:#c72420;
}
.fullscreen-btn.hide{
  opacity:0;
  visibility:hidden;
  transition:opacity .5s ease, visibility .5s ease;
}
/* Modo pantalla completa del contenedor */
.player-box:fullscreen{
  max-width:100%;
  height:100vh;
  border-radius:0;
}
.player-box:fullscreen .player-header,
.player-box:fullscreen .player-footer{
  display:none;
}
.player-box:fullscreen .player-frame{
  height:100vh;
  aspect-ratio:auto;
}
.player-box:fullscreen .fullscreen-btn{
  display:none;
}

.modal-overlay{position:fixed;inset:0;z-index:300;background:#000000cc;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{width:100%;max-width:420px;background:var(--surface);border-radius:16px;border:1px solid var(--border2);overflow:hidden}
.modal-box.wide{max-width:550px;max-height:90vh;display:flex;flex-direction:column}
.modal-header{flex-shrink:0;padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px}
.modal-body{flex:1;overflow-y:auto;padding:24px}
.modal-body::-webkit-scrollbar{width:4px}
.modal-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;font-weight:500}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field select option{background:var(--surface2)}
.field textarea{resize:vertical;min-height:72px;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.servers-group{border:1px solid var(--border2);border-radius:8px;padding:12px;margin-bottom:16px}
.servers-group-title{font-size:11px;color:var(--accent);margin-bottom:10px;font-weight:500}
.servers-group .field{margin-bottom:10px}
.servers-group .field:last-child{margin-bottom:0}
.btn{width:100%;padding:11px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{background:#c72420}
.btn-ghost{background:var(--surface2);color:var(--muted);border:1px solid var(--border2)}
.btn-ghost:hover{color:var(--text);border-color:var(--border3)}
.btn-danger{background:#7f1d1d44;color:#fca5a5;border:1px solid #ef444433}
.btn-danger:hover{background:#ef4444;color:#fff;border-color:#ef4444}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-actions .btn{flex:1}
.form-error{color:#fca5a5;font-size:12px;margin-top:8px;display:none}
.checkbox-label{display:flex;align-items:center;gap:8px;cursor:pointer}
.checkbox-label input{width:auto;margin:0}

.admin-panel{position:fixed;top:0;right:0;bottom:0;width:340px;background:var(--surface);border-left:1px solid var(--border2);z-index:150;transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column}
.admin-panel.open{transform:translateX(0)}
.admin-panel-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.admin-panel-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}
.admin-tag{background:#e8302a22;border:1px solid #e8302a55;color:var(--accent);font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;letter-spacing:1px}
.admin-panel-body{flex:1;overflow-y:auto;padding:16px}
.admin-panel-body::-webkit-scrollbar{width:4px}
.admin-panel-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.admin-section{margin-bottom:24px}
.admin-section-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:500;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.admin-canal-list{display:flex;flex-direction:column;gap:6px}
.admin-canal-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px}
.admin-canal-item-icon{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:9px;text-align:center;line-height:1.1;flex-shrink:0;overflow:hidden}
.admin-canal-item-icon img{width:100%;height:100%;object-fit:contain;border-radius:4px}
.admin-canal-item-info{flex:1;min-width:0}
.admin-canal-item-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.admin-canal-item-cat{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.admin-canal-actions{display:flex;gap:4px}
.icon-btn{width:26px;height:26px;border-radius:5px;border:1px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;transition:all .15s;color:var(--muted)}
.icon-btn:hover{border-color:var(--border3);color:var(--text)}
.icon-btn.delete:hover{background:#ef444422;border-color:#ef444466;color:#fca5a5}
.icon-btn.edit-ic:hover{background:#3b82f622;border-color:#3b82f666;color:#93c5fd}
.add-canal-btn{width:100%;padding:10px;border-radius:8px;border:1px dashed var(--border2);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;margin-top:8px}
.add-canal-btn:hover{border-color:var(--accent);color:var(--accent)}
.admin-backdrop{position:fixed;inset:0;z-index:140;display:none}
.admin-backdrop.open{display:block}

.spinner-wrap{display:flex;align-items:center;justify-content:center;padding:80px 20px;grid-column:1/-1}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.empty{text-align:center;padding:60px 20px;color:var(--muted);grid-column:1/-1}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:12px 20px;font-size:13px;color:var(--text);z-index:999;transition:transform .3s ease;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:#22c55e55;color:#86efac}
.toast.error{border-color:#ef444455;color:#fca5a5}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@media(max-width:600px){
  .admin-panel{width:100%}
  .header{padding:14px 16px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;padding:8px 16px 20px}
  .tabs{padding:14px 16px 8px}
  .search-wrap{padding:0 16px}
  .player-footer{flex-direction:column;align-items:stretch}
  .server-buttons{justify-content:center}
  .modal-box.wide{max-height:85vh}
  .fullscreen-btn{bottom:60px;right:15px;width:40px;height:40px;font-size:18px}
  .server-btn{padding:4px 10px;font-size:11px}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo" id="logoBtn">SIGNAL<span>TV</span></div>
  <div class="header-right">
    <div class="conn-dot" id="connDot"></div>
    <div class="live-badge"><div class="live-dot"></div>En vivo</div>
  </div>
</div>

<div class="search-wrap" style="margin-top:16px">
  <input class="search-input" id="searchInput" placeholder="🔍 Buscar canal...">
</div>

<div class="tabs" id="tabsContainer">
  <button class="tab active" data-cat="todo">Todos</button>
  <button class="tab" data-cat="deportes">⚽ Deportes</button>
  <button class="tab" data-cat="entretenimiento">🎬 Entretenimiento</button>
  <button class="tab" data-cat="documentales">🔭 Documentales</button>
  <button class="tab" data-cat="cine">🎥 Cine</button>
</div>

<div class="grid" id="grid">
  <div class="spinner-wrap"><div class="spinner"></div></div>
</div>

<div class="player-overlay" id="overlay">
  <div class="player-box" id="playerBox">
    <div class="player-header">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="player-title" id="playerTitle">Canal</span>
        <span class="player-cat-badge" id="playerBadge"></span>
      </div>
      <div class="close-btn" id="closePlayerBtn">✕</div>
    </div>
    <iframe class="player-frame" id="playerFrame" allow="autoplay; fullscreen; microphone; camera" allowfullscreen referrerpolicy="no-referrer" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-presentation allow-modals allow-popups-to-escape-sandbox"></iframe>
    <div class="player-footer">
      <div class="server-buttons" id="serverButtons"></div>
      <span class="player-hint">Si no carga, el canal puede estar offline momentáneamente</span>
      <span class="live-badge" style="font-size:10px;padding:3px 10px"><div class="live-dot"></div>En vivo</span>
    </div>
    <button class="fullscreen-btn" id="fullscreenBtn" title="Pantalla completa">⛶</button>
  </div>
</div>

<div class="modal-overlay" id="loginModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">Acceso Admin</span>
      <div class="close-btn" onclick="cerrarModal('loginModal')">✕</div>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Usuario</label>
        <input type="text" id="loginUser" placeholder="admin" autocomplete="off">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="loginPass" placeholder="••••••••">
      </div>
      <div class="form-error" id="loginError"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="cerrarModal('loginModal')">Cancelar</button>
        <button class="btn btn-accent" id="loginBtn">Ingresar</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="canalModal">
  <div class="modal-box wide">
    <div class="modal-header">
      <span class="modal-title" id="canalModalTitle">Agregar Canal</span>
      <div class="close-btn" onclick="cerrarModal('canalModal')">✕</div>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editDocId">
      <div class="field">
        <label>Nombre del Canal</label>
        <input type="text" id="fNombre" placeholder="Ej: ESPN Premium">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Categoría</label>
          <select id="fCat">
            <option value="deportes">⚽ Deportes</option>
            <option value="entretenimiento">🎬 Entretenimiento</option>
            <option value="documentales">🔭 Documentales</option>
            <option value="cine">🎥 Cine</option>
          </select>
        </div>
        <div class="field">
          <label>Icono (texto corto)</label>
          <input type="text" id="fIcon" placeholder="ESPN" maxlength="12">
        </div>
      </div>
      <div class="field">
        <label>Logo (URL de imagen, opcional)</label>
        <input type="url" id="fLogo" placeholder="https://ejemplo.com/logo.png">
      </div>
      
      <div class="servers-group">
        <div class="servers-group-title">🌐 Múltiples Servidores (Opcional)</div>
        <div class="field">
          <label>Servidor 1 (Principal)</label>
          <textarea id="fUrl1" placeholder="https://..." rows="2"></textarea>
        </div>
        <div class="field">
          <label>Servidor 2</label>
          <textarea id="fUrl2" placeholder="https://..." rows="2"></textarea>
        </div>
        <div class="field">
          <label>Servidor 3</label>
          <textarea id="fUrl3" placeholder="https://..." rows="2"></textarea>
        </div>
        <div class="checkbox-label">
          <input type="checkbox" id="fMultiServer">
          <label style="margin:0;font-size:12px;text-transform:none">Activar selector de servidores en el reproductor</label>
        </div>
      </div>
      
      <div class="form-error" id="canalError"></div>
      <div class="modal-actions">
        <button class="btn btn-danger" id="btnEliminarModal" style="display:none">🗑 Eliminar</button>
        <button class="btn btn-ghost" onclick="cerrarModal('canalModal')">Cancelar</button>
        <button class="btn btn-accent" id="btnGuardarCanal">Guardar</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="passModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">Cambiar Contraseña</span>
      <div class="close-btn" onclick="cerrarModal('passModal')">✕</div>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Contraseña actual</label>
        <input type="password" id="passActual" placeholder="••••••••">
      </div>
      <div class="field">
        <label>Nueva contraseña</label>
        <input type="password" id="passNueva" placeholder="••••••••">
      </div>
      <div class="field">
        <label>Confirmar nueva</label>
        <input type="password" id="passConfirm" placeholder="••••••••">
      </div>
      <div class="form-error" id="passError"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="cerrarModal('passModal')">Cancelar</button>
        <button class="btn btn-accent" id="cambiarPassBtn">Guardar</button>
      </div>
    </div>
  </div>
</div>

<div class="admin-backdrop" id="adminBackdrop"></div>

<div class="admin-panel" id="adminPanel">
  <div class="admin-panel-header">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="admin-panel-title">Panel Admin</span>
      <span class="admin-tag">ADMIN</span>
    </div>
    <div class="close-btn" id="closeAdminPanelBtn">✕</div>
  </div>
  <div class="admin-panel-body">
    <div class="admin-section">
      <div class="admin-section-title">Canales (<span id="adminCount">0</span>)</div>
      <div class="admin-canal-list" id="adminCanalList"></div>
      <button class="add-canal-btn" id="addCanalBtn">+ Agregar canal</button>
    </div>

function escHTML(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toast(msg, type='') {
  const el = document.getElementById('toast');

  setTimeout(() => { el.className = 'toast'; }, 2800);

function sanitizarURL(url) {
  if (!url) return null;
  const peligrosos = ['javascript:', 'data:text/html', 'about:blank', 'document.write', 'eval('];
  for (let p of peligrosos) {
    if (url.toLowerCase().includes(p)) {
      return null;
    }
  }
  return url;
}

function limpiarURLStream(url) {
  if (!url) return null;
  if (url.includes('bixplay.online') && !url.includes('autoplay')) {
    return url + (url.includes('?') ? '&' : '?') + 'autoplay=1';
  }
  return url;
}

function getServerUrl(canal, server) {
  if (server === 1) return canal.url;
  if (server === 2) return canal.url2;
  if (server === 3) return canal.url3;
  return canal.url;
}

function cambiarServidor(server) {
  if (!currentCanal) return;
  currentServer = server;
  const url = getServerUrl(currentCanal, server);
  const urlSegura = sanitizarURL(url);
  if (!urlSegura) {
    toast('URL del servidor ' + server + ' no válida', 'error');
    return;
  }
  const urlLimpia = limpiarURLStream(urlSegura);
  playerFrame.src = urlLimpia;
  toast('Cambiando a servidor ' + server, 'success');
  
  document.querySelectorAll('.server-btn').forEach(btn => {
    btn.classList.remove('active');
    if (parseInt(btn.dataset.server) === server) {
      btn.classList.add('active');
    }
  });
}

function renderServerButtons(canal) {
  if (!canal.multiServer) {
    serverButtons.innerHTML = '';
    return;
  }
  
  const servers = [
    {num: 1, url: canal.url, label: '1'},
    {num: 2, url: canal.url2, label: '2'},
    {num: 3, url: canal.url3, label: '3'}
  ];
  
  const buttonsHtml = servers.map(s => {
    const hasUrl = s.url && s.url.trim() !== '';
    const activeClass = (currentServer === s.num) ? 'active' : '';
    const disabledClass = !hasUrl ? 'disabled' : '';
    return `<button class="server-btn ${activeClass} ${disabledClass}" data-server="${s.num}" ${!hasUrl ? 'disabled' : ''}>Servidor ${s.label}</button>`;
  }).join('');
  
  serverButtons.innerHTML = buttonsHtml;
  
  document.querySelectorAll('.server-btn').forEach(btn => {
    if (!btn.disabled) {
      btn.addEventListener('click', () => {
        cambiarServidor(parseInt(btn.dataset.server));
      });
    }
  });
}

function ocultarBotonFlotante() {
  if (fullscreenTimeout) clearTimeout(fullscreenTimeout);
  fullscreenBtn.classList.remove('hide');
  fullscreenTimeout = setTimeout(() => {
    fullscreenBtn.classList.add('hide');
  }, 3000);
}

  if (fullscreenBtn) {

}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    playerBox.requestFullscreen().catch(err => {

    });
  } else {
    document.exitFullscreen();

}

});

function bloquearPopupsEnIframe() {
  try {
    playerFrame.sandbox = 'allow-same-origin allow-scripts allow-forms allow-presentation allow-modals allow-popups-to-escape-sandbox';
    
    const iframeWindow = playerFrame.contentWindow;
    if (iframeWindow) {
      try {
        iframeWindow.open = function(url, name, features) {
          console.warn('Popup bloqueado en iframe:', url);
          toast('⚠️ Ventana emergente bloqueada', 'error');
          return null;
        };
      } catch(e) { }
    }
    
    window.addEventListener('message', function(event) {
      if (event.data && (event.data.type === 'popup' || event.data.action === 'open')) {
        toast('⚠️ Popup bloqueado', 'error');
        event.stopPropagation();
      }
    });
    
  } catch(e) { console.warn('Error configurando bloqueador:', e); }
}

function inyectarBloqueadorEnIframe() {
  try {
    const iframeDoc = playerFrame.contentDocument || playerFrame.contentWindow?.document;
    if (iframeDoc) {
      const script = iframeDoc.createElement('script');
      script.textContent = `
        var originalOpen = window.open;
        window.open = function(url, name, features) {
          console.warn('Popup bloqueado:', url);
          parent.postMessage({ type: 'popup', url: url }, '*');
          return null;
        };
        window.alert = function(msg) { console.warn('Alert bloqueado:', msg); };
        window.confirm = function() { return false; };
        window.onbeforeunload = null;
      `;
      iframeDoc.head.appendChild(script);
    }
  } catch(e) { }
}

function activarVolumenNativo() {
  try {
    const iframe = playerFrame;
    if (iframe && iframe.contentWindow) {
      const mouseEvent = new MouseEvent('mousemove', { bubbles: true });
      iframe.dispatchEvent(mouseEvent);
      
      setTimeout(() => {
        const clickEvent = new MouseEvent('click', { bubbles: true });
        iframe.dispatchEvent(clickEvent);
      }, 500);
    }
    
    const unlockAudio = () => {
      try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        audioContext.resume();
      } catch(e) {}
    };
    
    overlay.addEventListener('click', unlockAudio, { once: true });
    playerFrame.addEventListener('load', () => {
      setTimeout(() => {
        bloquearPopupsEnIframe();
        inyectarBloqueadorEnIframe();
      }, 1000);
    });
  } catch(e) { console.warn('Error:', e); }
}

function abrirCanal(id) {
  const c = canales.find(x => x.id === id);
  if (!c) { toast('Canal no encontrado', 'error'); return; }
  
  currentCanal = c;
  currentServer = 1;
  
  let urlSegura = sanitizarURL(c.url);
  if (!urlSegura) { toast('URL del canal no válida', 'error'); return; }
  urlSegura = limpiarURLStream(urlSegura);
  
  const col = catColors[c.cat] || catColors.deportes;
  if (cardActiva) {
    const prevCard = document.getElementById('card-' + cardActiva);
    if (prevCard) prevCard.classList.remove('playing');
  }
  cardActiva = id;
  const card = document.getElementById('card-' + id);
  if (card) card.classList.add('playing');
  
  playerTitle.textContent = c.nombre;
  playerBadge.textContent = col.label;
  playerBadge.style.background = col.badge;
  playerBadge.style.color = col.badgeText;
  
  playerFrame.src = urlSegura;
  
  renderServerButtons(c);
  
  setTimeout(() => {
    activarVolumenNativo();
    bloquearPopupsEnIframe();
  }, 500);
  
  overlay.classList.add('open');
  
  setTimeout(() => {
    fullscreenBtn.classList.remove('hide');

}

  if (!lista.length) {
    grid.innerHTML = '<div class="empty"><div style="font-size:36px;margin-bottom:10px">📡</div>No hay canales en esta categoría</div>';
    return;
  }
  
  grid.innerHTML = lista.map(c => {
    const col = catColors[c.cat] || catColors.deportes;
    const iconHTML = c.logo
      ? `<img src="${escHTML(c.logo)}" alt="${escHTML(c.nombre)}" onerror="this.style.display='none'">`
      : `<span class="canal-icon-text" style="color:${col.color}">${escHTML(c.icon || c.nombre.substring(0,4))}</span>`;
    const isPlaying = cardActiva === c.id;
    return `<div class="canal-card${isPlaying ? ' playing' : ''}" data-id="${c.id}">
      <div class="playing-indicator">▶ Viendo</div>
      <div class="card-edit-btn" data-id="${c.id}" data-edit="true">✎</div>

        <div class="canal-icon" style="background:${col.bg};border:1px solid ${col.border}">${iconHTML}</div>

        <div class="canal-nombre">${escHTML(c.nombre)}</div>
        <div class="canal-cat" style="color:${col.color}">${col.label}</div>
      </div>
    </div>`;
  }).join('');
  
  if (adminLogueado) grid.classList.add('admin-mode');
  else grid.classList.remove('admin-mode');
  
  document.querySelectorAll('.canal-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.card-edit-btn')) return;

      if (adminLogueado) editarCanal(id);

      e.stopPropagation();
      const id = btn.dataset.id;
      if (adminLogueado) editarCanal(id);
    });
  });
}

}

function suscribirCanales() {
  if (unsubCanales) unsubCanales();
  const q = query(collection(db, 'canales'), orderBy('orden', 'asc'));
  unsubCanales = onSnapshot(q, snap => {
    canales = snap.docs.map(d => ({id: d.id, ...d.data()}));
    renderGrid();
    if (adminLogueado) renderAdminList();
  }, err => { toast('Error de conexión con Firebase', 'error'); });
}

function renderAdminList() {
  document.getElementById('adminCount').textContent = canales.length;
  const list = document.getElementById('adminCanalList');
  list.innerHTML = canales.map(c => {
    const col = catColors[c.cat] || catColors.deportes;
    const iconHTML = c.logo
      ? `<img src="${escHTML(c.logo)}" alt="">`
      : `<span style="font-family:'Bebas Neue',sans-serif;font-size:9px;color:${col.color}">${escHTML(c.icon || c.nombre.substring(0,4))}</span>`;
    return `<div class="admin-canal-item">
      <div class="admin-canal-item-icon" style="background:${col.bg};border:1px solid ${col.border}">${iconHTML}</div>
      <div class="admin-canal-item-info">
        <div class="admin-canal-item-name">${escHTML(c.nombre)}</div>
        <div class="admin-canal-item-cat" style="color:${col.color}">${col.label}</div>
      </div>
      <div class="admin-canal-actions">
        <button class="icon-btn edit-ic" data-id="${c.id}">✎</button>
        <button class="icon-btn delete" data-id="${c.id}">✕</button>
      </div>
    </div>`;
  }).join('');
  
  document.querySelectorAll('.admin-canal-actions .edit-ic').forEach(btn => {
    btn.addEventListener('click', () => editarCanal(btn.dataset.id));
  });
  document.querySelectorAll('.admin-canal-actions .delete').forEach(btn => {
    btn.addEventListener('click', () => eliminarCanal(btn.dataset.id));
  });
}

function abrirAdminPanel() {
  renderAdminList();
  document.getElementById('adminPanel').classList.add('open');
  document.getElementById('adminBackdrop').classList.add('open');
}

function cerrarAdminPanel() {
  document.getElementById('adminPanel').classList.remove('open');
  document.getElementById('adminBackdrop').classList.remove('open');
}

function abrirLoginAdmin() {
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginError').style.display = 'none';
  abrirModal('loginModal');
}

async function intentarLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  await cargarCredenciales();
  if (u === adminCreds.user && p === adminCreds.pass) {
    adminLogueado = true;
    sessionStorage.setItem('stv_session', '1');
    cerrarModal('loginModal');
    renderGrid();
    abrirAdminPanel();
    toast('Bienvenido, ' + u, 'success');
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginError').textContent = 'Usuario o contraseña incorrectos';
  }
}

function cerrarSesion() {
  adminLogueado = false;
  sessionStorage.removeItem('stv_session');
  cerrarAdminPanel();
  renderGrid();
  toast('Sesión cerrada');
}

function abrirFormCanal(docId = null) {
  const esEditar = docId !== null;
  document.getElementById('canalModalTitle').textContent = esEditar ? 'Editar Canal' : 'Agregar Canal';
  document.getElementById('editDocId').value = docId || '';
  document.getElementById('btnEliminarModal').style.display = esEditar ? 'block' : 'none';
  
  if (esEditar) {
    const c = canales.find(x => x.id === docId);
    if (c) {
      document.getElementById('fNombre').value = c.nombre || '';
      document.getElementById('fCat').value = c.cat || 'deportes';
      document.getElementById('fIcon').value = c.icon || '';
      document.getElementById('fLogo').value = c.logo || '';
      document.getElementById('fUrl1').value = c.url || '';
      document.getElementById('fUrl2').value = c.url2 || '';
      document.getElementById('fUrl3').value = c.url3 || '';
      document.getElementById('fMultiServer').checked = c.multiServer === true;
    }
  } else {
    document.getElementById('fNombre').value = '';
    document.getElementById('fCat').value = 'deportes';
    document.getElementById('fIcon').value = '';
    document.getElementById('fLogo').value = '';
    document.getElementById('fUrl1').value = '';
    document.getElementById('fUrl2').value = '';
    document.getElementById('fUrl3').value = '';
    document.getElementById('fMultiServer').checked = false;
  }
  abrirModal('canalModal');
}

function editarCanal(id) {
  if (!adminLogueado) return;
  abrirFormCanal(id);
}

async function guardarCanal() {
  const nombre = document.getElementById('fNombre').value.trim();
  const cat = document.getElementById('fCat').value;
  const icon = document.getElementById('fIcon').value.trim();
  const logo = document.getElementById('fLogo').value.trim();
  const url1 = document.getElementById('fUrl1').value.trim();
  const url2 = document.getElementById('fUrl2').value.trim();
  const url3 = document.getElementById('fUrl3').value.trim();
  const multiServer = document.getElementById('fMultiServer').checked;
  const errEl = document.getElementById('canalError');
  
  if (!nombre || !url1) {
    errEl.textContent = 'Nombre y Servidor 1 son obligatorios';
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';
  
  const data = { 
    nombre, cat, 
    icon: icon || nombre.substring(0, 6).toUpperCase(), 
    logo, 
    url: url1,
    url2: url2 || '',
    url3: url3 || '',
    multiServer: multiServer
  };
  const docId = document.getElementById('editDocId').value;
  
  try {
    if (docId) {
      await updateDoc(doc(db, 'canales', docId), data);
      toast('Canal actualizado', 'success');
    } else {
      data.orden = canales.length;
      await addDoc(collection(db, 'canales'), data);
      toast('Canal agregado', 'success');
    }
    cerrarModal('canalModal');
  } catch(e) {
    toast('Error al guardar: ' + e.message, 'error');
  }
}

async function eliminarCanal(id) {
  const c = canales.find(x => x.id === id);
  if (!c || !confirm(`¿Eliminar "${c.nombre}"?`)) return;
  try {
    await deleteDoc(doc(db, 'canales', id));
    toast('Canal eliminado');
  } catch(e) { toast('Error al eliminar', 'error'); }
}

async function eliminarCanalModal() {
  const id = document.getElementById('editDocId').value;
  cerrarModal('canalModal');
  await eliminarCanal(id);
}

function abrirCambiarPass() {
  document.getElementById('passActual').value = '';
  document.getElementById('passNueva').value = '';
  document.getElementById('passConfirm').value = '';
  document.getElementById('passError').style.display = 'none';
  cerrarAdminPanel();
  abrirModal('passModal');
}

async function cambiarPassword() {
  const actual = document.getElementById('passActual').value;
  const nueva = document.getElementById('passNueva').value;
  const confirm = document.getElementById('passConfirm').value;
  const errEl = document.getElementById('passError');
  
  if (actual !== adminCreds.pass) {
    errEl.textContent = 'Contraseña actual incorrecta';
    errEl.style.display = 'block';
    return;
  }
  if (nueva.length < 4) {
    errEl.textContent = 'Mínimo 4 caracteres';
    errEl.style.display = 'block';
    return;
  }
  if (nueva !== confirm) {
    errEl.textContent = 'Las contraseñas no coinciden';
    errEl.style.display = 'block';
    return;
  }
  try {
    await setDoc(doc(db, 'config', 'admin'), { user: adminCreds.user, pass: nueva });
    adminCreds.pass = nueva;
    cerrarModal('passModal');
    toast('Contraseña actualizada', 'success');
  } catch(e) { toast('Error al guardar', 'error'); }
}

function exportarJSON() {
  const data = canales.map(({id, ...rest}) => rest);
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'signaltv-canales.json';
  a.click();
  toast('Canales exportados', 'success');
}

async function importarJSON(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('Formato inválido');
      toast('Importando ' + data.length + ' canales...');
      for (const c of data) {
        await addDoc(collection(db, 'canales'), { ...c, orden: canales.length });
      }
      toast(data.length + ' canales importados', 'success');
    } catch(err) { toast('JSON inválido', 'error'); }
  };
  reader.readAsText(file);
}

searchInput.addEventListener('input', buscar);
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => filtrar(tab.dataset.cat, tab));
});
closePlayerBtn.addEventListener('click', cerrarPlayer);
overlay.addEventListener('click', (e) => { if (e.target === overlay) cerrarPlayer(); });
document.getElementById('logoBtn').addEventListener('click', () => {
  if (adminLogueado) abrirAdminPanel();
  else abrirLoginAdmin();
});
document.getElementById('loginBtn').addEventListener('click', intentarLogin);
document.getElementById('closeAdminPanelBtn').addEventListener('click', cerrarAdminPanel);
document.getElementById('adminBackdrop').addEventListener('click', cerrarAdminPanel);
document.getElementById('addCanalBtn').addEventListener('click', () => abrirFormCanal());
document.getElementById('btnGuardarCanal').addEventListener('click', guardarCanal);
document.getElementById('btnEliminarModal').addEventListener('click', eliminarCanalModal);
document.getElementById('exportBtn').addEventListener('click', exportarJSON);
document.getElementById('importFileInput').addEventListener('change', (e) => importarJSON(e.target.files[0]));
document.getElementById('cambiarPassAdminBtn').addEventListener('click', abrirCambiarPass);
document.getElementById('cambiarPassBtn').addEventListener('click', cambiarPassword);
document.getElementById('cerrarSesionBtn').addEventListener('click', cerrarSesion);
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    cerrarPlayer();
    document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
  }
});

async function init() {
  await cargarCredenciales();
  await seedCanalesIfEmpty();
  suscribirCanales();
  if (adminLogueado) renderGrid();
  fullscreenBtn.classList.add('hide');
}

init();
</script>
</body>
</html>
