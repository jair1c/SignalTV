name: Build & Release APK

on:
  push:
    tags:
      - 'v*'          # Dispara con: git tag v1.0.0 && git push --tags
  workflow_dispatch:  # También permite ejecutar manualmente desde GitHub

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android-app/**/*.gradle*', 'android-app/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Dar permisos a gradlew
        run: chmod +x android-app/gradlew
        working-directory: ${{ github.workspace }}

      - name: Generar keystore desde secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android-app/app/keystore.jks

      - name: Build Release APK
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android-app
          ./gradlew assembleRelease --no-daemon

      - name: Renombrar APK
        run: |
          mkdir -p output
          cp android-app/app/build/outputs/apk/release/app-release.apk \
             output/SignalTV-${{ github.ref_name }}.apk

      - name: Upload APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: SignalTV-APK
          path: output/SignalTV-*.apk
          retention-days: 30

      - name: Crear GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: output/SignalTV-*.apk
          name: SignalTV ${{ github.ref_name }}
          body: |
            ## SignalTV ${{ github.ref_name }}
            
            ### Instalación
            1. Descarga el APK
            2. En Android: Ajustes → Seguridad → Fuentes desconocidas ✓
            3. Instala el APK
            
            ### Compatibilidad
            - Android 5.0+ (Phone / Tablet)
            - Android TV / Fire TV / TV Box
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
