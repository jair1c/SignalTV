name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android-app/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Decodificar keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android-app/app/keystore.jks

      - name: Build Release APK
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android-app
          gradle assembleRelease --no-daemon --stacktrace

      - name: Preparar APK
        run: |
          mkdir -p output
          APK_PATH="android-app/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK_PATH" ]; then
            cp "$APK_PATH" "output/SignalTV-${{ github.ref_name }}.apk"
            echo "APK generado: $(du -sh output/*.apk)"
          else
            echo "ERROR: APK no encontrado en $APK_PATH"
            find android-app/app/build -name "*.apk" 2>/dev/null || echo "No se encontraron APKs"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SignalTV-APK
          path: output/SignalTV-*.apk
          retention-days: 30

      - name: Crear Release en GitHub
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: output/SignalTV-*.apk
          name: SignalTV ${{ github.ref_name }}
          body: |
            ## SignalTV ${{ github.ref_name }}

            ### Instalación
            1. Descarga el APK
            2. Android: **Ajustes → Seguridad → Fuentes desconocidas** ✓
            3. Instala el APK descargado

            ### Compatibilidad
            - Android 5.0+ (teléfonos y tablets)
            - Android TV / Fire TV Stick / TV Box
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
